<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Ordering App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* Header */
    header { background: white; border-radius: 12px; padding: 20px 30px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .logo { font-size: 28px; font-weight: bold; color: #667eea; }
    .nav-right { display: flex; gap: 15px; align-items: center; }
    .user-info { background: #f0f0f0; padding: 10px 15px; border-radius: 8px; font-size: 14px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 14px; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger { background: #ff6b6b; color: white; }
    .btn-danger:hover { background: #ff5252; }
    
    /* Main layout */
    .main-content { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
    @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
    
    /* Auth Section */
    .auth-container { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .auth-title { font-size: 32px; margin-bottom: 30px; color: #333; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
    .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
    .form-group input[type="password"]:focus { border-color: #667eea; }
    .auth-message { padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .toggle-mode { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    .toggle-mode a { color: #667eea; cursor: pointer; font-weight: 600; }
    
    /* Hidden class */
    .hidden { display: none !important; }
    
    /* Menu Section */
    .menu-container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .section-title { font-size: 24px; margin-bottom: 20px; color: #333; }
    .filter-group { margin-bottom: 25px; }
    .filter-group label { display: block; margin-bottom: 10px; font-weight: 600; }
    .filter-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; }
    
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .menu-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: all 0.3s; }
    .menu-card:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
    .menu-card-image { width: 100%; height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .menu-card-image img { width: 100%; height: 100%; object-fit: cover; }
    .menu-card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
    .menu-card-content { padding: 18px; }
    .menu-card-name { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 8px; }
    .menu-card-price { font-size: 20px; font-weight: 700; color: #667eea; margin-bottom: 8px; }
    .menu-card-category { font-size: 12px; color: #999; margin-bottom: 15px; background: #f5f5f5; padding: 4px 10px; border-radius: 4px; display: inline-block; }
    .menu-card-buttons { display: flex; gap: 10px; }
    .menu-card-buttons .btn { flex: 1; padding: 10px; }
    
    /* Add Food Section */
    .add-food-container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 30px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    
    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }
    .sidebar-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .sidebar-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #333; }
    .sidebar-subtitle { font-size: 12px; color: #999; margin-bottom: 15px; }
    
    /* Cart */
    .cart-container { flex: 1; }
    .cart-empty { color: #999; font-size: 14px; }
    .cart-items { margin-bottom: 15px; max-height: 400px; overflow-y: auto; }
    .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e0e0e0; font-size: 13px; }
    .cart-item-name { font-weight: 600; }
    .cart-item-qty { color: #999; }
    .cart-item-price { font-weight: 700; color: #667eea; }
    .cart-total-row { padding: 12px 0; border-top: 2px solid #667eea; margin-top: 10px; font-size: 16px; font-weight: 700; display: flex; justify-content: space-between; }
    
    /* Orders */
    .orders-list { max-height: 500px; overflow-y: auto; }
    .order-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
    .order-id { font-size: 13px; font-weight: 700; color: #667eea; margin-bottom: 5px; }
    .order-total { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 5px; }
    .order-items { font-size: 12px; color: #666; }
    
    /* User Profile */
    .profile-info { text-align: center; margin-bottom: 20px; }
    .profile-email { font-size: 13px; color: #999; margin-bottom: 5px; }
    .profile-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: 700; font-size: 20px; }
    
    /* Footer */
    footer { text-align: center; margin-top: 50px; padding: 30px 20px; color: #999; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.2); }
    footer a { color: #667eea; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">🍕 FoodHub</div>
    <div style="font-size: 12px; color: #999;">Designed by Katturi Saitej</div>
    <div class="nav-right">
      <div id="authStatus" class="user-info hidden"></div>
      <button id="logoutBtn" class="btn btn-danger hidden">Logout</button>
    </div>
  </header>

  <div class="container">
    <!-- Auth Section -->
    <div id="authSection">
      <div class="auth-container">
        <h1 class="auth-title">Login / Sign Up</h1>
        <div id="authMessage" class="auth-message hidden"></div>
        
        <form id="authForm">
          <div class="form-group">
            <label>Email</label>
            <input id="authEmail" type="email" placeholder="your@email.com" required />
          </div>
          
          <div class="form-group">
            <label>Password</label>
            <input id="authPassword" type="password" placeholder="••••••••" required />
          </div>
          
          <div class="form-group hidden" id="nameField">
            <label>Name</label>
            <input id="authName" type="text" placeholder="Your name" />
          </div>
          
          <div class="form-group">
            <label>Mode</label>
            <select id="authMode">
              <option value="login">Login</option>
              <option value="signup">Sign Up</option>
            </select>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Submit</button>
        </form>
      </div>
    </div>

    <!-- Main Section -->
    <div id="mainSection" class="hidden">
      <div class="main-content">
        <!-- Left Content -->
        <div>
          <!-- Menu Filter -->
          <div class="menu-container">
            <div class="filter-group">
              <label>🔍 Filter by Category</label>
              <select id="categoryFilter">
                <option value="all">All Categories</option>
              </select>
            </div>
          </div>

          <!-- Menu -->
          <div class="menu-container">
            <h2 class="section-title">📋 Menu</h2>
            <div id="menu" class="menu-grid">Loading menu...</div>
          </div>

          <!-- Add Food -->
          <div class="add-food-container">
            <h2 class="section-title">➕ Add New Food Item</h2>
            <div id="message" class="auth-message hidden"></div>
            <form id="foodForm">
              <div class="form-grid">
                <div class="form-group">
                  <label>Food Name</label>
                  <input id="foodName" type="text" placeholder="e.g., Pizza" required />
                </div>
                <div class="form-group">
                  <label>Price ($)</label>
                  <input id="foodPrice" type="number" placeholder="9.99" required min="0" step="0.01" />
                </div>
                <div class="form-group">
                  <label>Category</label>
                  <input id="foodCategory" type="text" placeholder="e.g., Fast Food" />
                </div>
                <div class="form-group">
                  <label>Image URL</label>
                  <input id="foodImage" type="text" placeholder="https://..." required />
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Add Food</button>
            </form>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
          <!-- Cart -->
          <div class="sidebar-card cart-container">
            <div class="sidebar-title">🛒 Your Cart</div>
            <div id="cart" class="cart-empty">Your cart is empty</div>
            <div id="cartTotal" class="cart-total-row hidden">
              <span>Total:</span>
              <span id="totalPrice">$0.00</span>
            </div>
            <button id="placeOrderBtn" class="btn btn-primary" style="width: 100%; margin-top: 15px; padding: 12px;" disabled>Place Order</button>
          </div>

          <!-- Order History -->
          <div class="sidebar-card">
            <div class="sidebar-title">📦 Order History</div>
            <div id="orders" class="orders-list">Sign in to see orders</div>
          </div>

          <!-- User Profile -->
          <div class="sidebar-card">
            <div class="sidebar-title">👤 Profile</div>
            <div id="userProfile" class="profile-info">
              <div class="profile-avatar" id="userAvatar"></div>
              <div style="font-weight: 600; margin-bottom: 5px;" id="userName"></div>
              <div class="profile-email" id="userEmail"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const authForm = document.getElementById('authForm');
    const authMode = document.getElementById('authMode');
    const nameField = document.getElementById('nameField');
    const authEmail = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');
    const authName = document.getElementById('authName');
    const authMessage = document.getElementById('authMessage');
    const authStatus = document.getElementById('authStatus');
    const logoutBtn = document.getElementById('logoutBtn');
    
    const authSection = document.getElementById('authSection');
    const mainSection = document.getElementById('mainSection');
    
    const categoryFilter = document.getElementById('categoryFilter');
    const menuElement = document.getElementById('menu');
    const cartElement = document.getElementById('cart');
    const cartTotalRow = document.getElementById('cartTotal');
    const totalPrice = document.getElementById('totalPrice');
    const placeOrderBtn = document.getElementById('placeOrderBtn');
    const ordersElement = document.getElementById('orders');
    
    const foodForm = document.getElementById('foodForm');
    const messageElement = document.getElementById('message');
    
    const userAvatar = document.getElementById('userAvatar');
    const userName = document.getElementById('userName');
    const userEmail = document.getElementById('userEmail');

    let menuItems = [];
    const cart = {};

    function getToken() { return localStorage.getItem('foodAppToken'); }
    function setToken(token) { token ? localStorage.setItem('foodAppToken', token) : localStorage.removeItem('foodAppToken'); }
    function getEmail() { return localStorage.getItem('foodAppEmail'); }
    function setEmail(email) { email ? localStorage.setItem('foodAppEmail', email) : localStorage.removeItem('foodAppEmail'); }

    function authFetch(url, options = {}) {
      const token = getToken();
      const headers = options.headers || {};
      if (token) headers.Authorization = `Bearer ${token}`;
      return fetch(url, { ...options, headers });
    }

    function showMessage(element, text, isError = false) {
      element.textContent = text;
      element.classList.remove('hidden', 'success', 'error');
      element.classList.add(isError ? 'error' : 'success');
    }

    function clearMessage(element) { element.classList.add('hidden'); }

    function showMainSection() {
      authSection.classList.add('hidden');
      mainSection.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
      authStatus.classList.remove('hidden');
      authStatus.textContent = `Hello, ${getEmail()}`;
      loadUserProfile();
      loadOrders();
    }

    function hideMainSection() {
      authSection.classList.remove('hidden');
      mainSection.classList.add('hidden');
      logoutBtn.classList.add('hidden');
      authStatus.classList.add('hidden');
      Object.keys(cart).forEach(key => delete cart[key]);
      updateCartUI();
    }

    authMode.addEventListener('change', () => {
      nameField.classList.toggle('hidden', authMode.value === 'login');
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = authEmail.value.trim();
      const password = authPassword.value.trim();
      const name = authName.value.trim();
      const url = authMode.value === 'signup' ? '/signup' : '/login';

      try {
        showMessage(authMessage, 'Processing...', false);
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error);
        setToken(result.token);
        setEmail(result.email);
        authForm.reset();
        showMainSection();
      } catch (err) {
        showMessage(authMessage, err.message, true);
      }
    });

    logoutBtn.addEventListener('click', () => {
      setToken(null);
      setEmail(null);
      hideMainSection();
      clearMessage(authMessage);
    });

    async function loadUserProfile() {
      try {
        const response = await authFetch('/user');
        if (response.ok) {
          const user = await response.json();
          userName.textContent = user.name || getEmail();
          userEmail.textContent = getEmail();
          const initial = (user.name || getEmail()).charAt(0).toUpperCase();
          userAvatar.textContent = initial;
        }
      } catch (err) {
        console.error('Error loading profile:', err);
      }
    }

    function renderCategories(items) {
      const categories = new Set(['all']);
      items.forEach(item => { if (item.category) categories.add(item.category); });
      categoryFilter.innerHTML = Array.from(categories).map(cat => 
        `<option value="${cat}">${cat === 'all' ? 'All Categories' : cat}</option>`
      ).join('');
    }

    function getImageOrPlaceholder(url) {
      return `
        <img src="${url}" alt="Food" onerror="this.parentElement.innerHTML = '<div class=\\'menu-card-placeholder\\'>🍽️ No Image</div>'" />
      `;
    }

    function renderMenu(items) {
      if (!items.length) {
        menuElement.innerHTML = '<div class="cart-empty">No items in this category</div>';
        return;
      }

      menuElement.innerHTML = items.map(item => `
        <div class="menu-card">
          <div class="menu-card-image">${getImageOrPlaceholder(item.image)}</div>
          <div class="menu-card-content">
            <div class="menu-card-name">${item.name}</div>
            <div class="menu-card-price">$${item.price.toFixed(2)}</div>
            <span class="menu-card-category">${item.category || 'Uncategorized'}</span>
            <div class="menu-card-buttons">
              <button type="button" class="btn btn-primary" onclick="addToCart('${item._id}', '${item.name}', ${item.price})">Add</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function updateCartUI() {
      const items = Object.values(cart);
      if (!items.length) {
        cartElement.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
        cartTotalRow.classList.add('hidden');
        placeOrderBtn.disabled = true;
        return;
      }

      const total = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
      cartElement.innerHTML = items.map(item => `
        <div class="cart-item">
          <div>
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-qty">× ${item.quantity}</div>
          </div>
          <div>
            <div class="cart-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
            <button type="button" class="btn btn-secondary" onclick="removeFromCart('${item.foodId}')" style="padding: 4px 8px; font-size: 12px; margin-top: 5px;">Remove</button>
          </div>
        </div>
      `).join('');
      totalPrice.textContent = `$${total.toFixed(2)}`;
      cartTotalRow.classList.remove('hidden');
      placeOrderBtn.disabled = false;
    }

    window.addToCart = (foodId, name, price) => {
      if (!cart[foodId]) {
        cart[foodId] = { foodId, name, price, quantity: 0 };
      }
      cart[foodId].quantity += 1;
      updateCartUI();
    };

    window.removeFromCart = (foodId) => {
      delete cart[foodId];
      updateCartUI();
    };

    async function loadMenu() {
      const category = categoryFilter.value || 'all';
      menuElement.innerHTML = '<div class="cart-empty">Loading...</div>';
      try {
        const response = await fetch(`/menu?category=${encodeURIComponent(category)}`);
        menuItems = await response.json();
        renderCategories(menuItems);
        renderMenu(menuItems);
      } catch (err) {
        menuElement.innerHTML = '<div class="cart-empty">Error loading menu</div>';
      }
    }

    async function loadOrders() {
      ordersElement.innerHTML = '<div class="cart-empty">Loading...</div>';
      try {
        const response = await authFetch('/orders');
        if (!response.ok) {
          ordersElement.innerHTML = '<div class="cart-empty">Failed to load orders</div>';
          return;
        }
        const orders = await response.json();
        if (!orders.length) {
          ordersElement.innerHTML = '<div class="cart-empty">No orders yet</div>';
          return;
        }
        ordersElement.innerHTML = orders.slice(0, 10).map(order => `
          <div class="order-item">
            <div class="order-id">Order #${order._id.slice(-6)}</div>
            <div class="order-total">$${order.total.toFixed(2)}</div>
            <div class="order-items">${order.items.map(i => `${i.name} ×${i.quantity}`).join(', ')}</div>
          </div>
        `).join('');
      } catch (err) {
        ordersElement.innerHTML = '<div class="cart-empty">Error loading orders</div>';
      }
    }

    foodForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('foodName').value.trim();
      const price = Number(document.getElementById('foodPrice').value);
      const category = document.getElementById('foodCategory').value.trim();
      const image = document.getElementById('foodImage').value.trim();

      try {
        const response = await fetch('/add-food', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, price, image, category })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error);
        showMessage(messageElement, 'Food added successfully!', false);
        foodForm.reset();
        loadMenu();
      } catch (err) {
        showMessage(messageElement, err.message, true);
      }
    });

    placeOrderBtn.addEventListener('click', async () => {
      const items = Object.values(cart);
      if (!items.length) return;

      try {
        const response = await authFetch('/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error);
        showMessage(messageElement, 'Order placed successfully! 🎉', false);
        Object.keys(cart).forEach(key => delete cart[key]);
        updateCartUI();
        loadOrders();
      } catch (err) {
        showMessage(messageElement, err.message, true);
      }
    });

    categoryFilter.addEventListener('change', loadMenu);

    if (getToken()) {
      showMainSection();
      loadMenu();
    } else {
      loadMenu();
    }
  </script>

  <!-- Footer -->
  <footer>
    <div style="margin-bottom: 10px;">🍕 FoodHub - Food Ordering Application</div>
    <div>Designed and Built by <strong>Katturi Saitej</strong></div>
    <div style="margin-top: 8px; font-size: 12px; color: #aaa;">© 2026 All Rights Reserved</div>
  </footer>
</body>
</html>
